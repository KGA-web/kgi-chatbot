<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kaia - KGI Assistant</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #fff; height: 100vh; overflow: hidden; font-family: Arial, sans-serif; }
    
    .chat-container { display: flex; flex-direction: column; height: 100vh; }
    
    .chat-header {
      background: #a91f23;
      color: white;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .chat-header-info { display: flex; align-items: center; gap: 10px; }
    .avatar { width: 40px; height: 40px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .chat-header h3 { font-size: 16px; }
    .chat-header p { font-size: 11px; opacity: 0.8; }
    
    .lang-select { background: rgba(255,255,255,0.2); border: none; color: white; padding: 5px 10px; border-radius: 5px; font-size: 12px; cursor: pointer; }
    .lang-select option { color: black; }
    
    .progress-bar { background: #ffe9c6; padding: 8px 15px; font-size: 12px; color: #a91f23; display: flex; align-items: center; gap: 8px; }
    .progress-check { width: 14px; height: 14px; }
    
    .messages { flex: 1; overflow-y: auto; padding: 15px; background: #f9f9f9; display: flex; flex-direction: column; gap: 10px; }
    
    .message { max-width: 80%; padding: 12px 15px; border-radius: 15px; font-size: 14px; line-height: 1.4; }
    .message.bot { background: white; border: 1px solid #eee; align-self: flex-start; border-bottom-left-radius: 3px; }
    .message.user { background: #a91f23; color: white; align-self: flex-end; border-bottom-right-radius: 3px; }
    
    .typing { display: flex; gap: 4px; padding: 10px; background: white; border: 1px solid #eee; border-radius: 15px; width: fit-content; }
    .typing span { width: 8px; height: 8px; background: #999; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
    .typing span:nth-child(1) { animation-delay: 0s; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-8px); } }
    
    .course-buttons { display: flex; flex-wrap: wrap; gap: 8px; padding: 10px; background: white; }
    .course-btn { padding: 8px 15px; background: #ffe9c6; color: #a91f23; border: none; border-radius: 20px; font-size: 12px; cursor: pointer; transition: all 0.2s; }
    .course-btn:hover { background: #ffa84a; color: white; }
    
    .input-area { padding: 15px; background: white; border-top: 1px solid #eee; display: flex; gap: 10px; }
    .input-area input { flex: 1; padding: 12px 15px; border: 1px solid #ddd; border-radius: 25px; outline: none; font-size: 14px; }
    .input-area input:focus { border-color: #a91f23; }
    .input-area button { width: 45px; height: 45px; background: #a91f23; color: white; border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
    .input-area button:hover { background: #ffa84a; }
    .input-area button:disabled { opacity: 0.5; cursor: not-allowed; }
    
    .icon-btn { width: 40px; height: 40px; background: #f5f5f5; border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .icon-btn:hover { background: #eee; }
    
    .quick-actions { display: flex; justify-content: center; gap: 15px; padding: 10px; background: white; border-top: 1px solid #eee; }
    .quick-actions a { font-size: 12px; color: #a91f23; text-decoration: none; }
    .quick-actions a:hover { color: #ffa84a; }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <div class="chat-header-info">
        <div class="avatar">🎓</div>
        <div><h3>Kaia</h3><p id="status">Gathering details...</p></div>
      </div>
      <select class="lang-select" id="langSelect" onchange="changeLang()">
        <option value="en-IN">English</option>
        <option value="hi-IN">हिंदी</option>
        <option value="kn-IN">ಕನ್ನಡ</option>
        <option value="ta-IN">தமிழ்</option>
        <option value="te-IN">తెలుగు</option>
      </select>
    </div>
    
    <div class="progress-bar" id="progressBar">
      <svg class="progress-check" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
      <span id="progressText">Step 1 of 3</span>
    </div>
    
    <div class="messages" id="messages"></div>
    <div class="course-buttons" id="courseButtons" style="display:none;"></div>
    
    <div class="input-area">
      <button class="icon-btn" onclick="startVoice()" title="Speak">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
      </button>
      <input type="text" id="userInput" placeholder="Your name please..." onkeypress="if(event.key==='Enter')sendMsg()">
      <button onclick="sendMsg()" id="sendBtn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><line x1="22" x2="11" y1="2" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
      <button class="icon-btn" onclick="speakLast()" title="Listen">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
      </button>
    </div>
    
    <div class="quick-actions" id="quickActions" style="display:none;">
      <a href="tel:8088660000">📞 Call</a>
      <a href="https://apply.kgi.edu.in" target="_blank">📝 Apply Now</a>
    </div>
  </div>

  <script>
    // ===================== CONFIG =====================
    const GROQ_API_KEY = 'YOUR_GROQ_API_KEY';
    const SHEET_URL = 'YOUR_GOOGLE_APPS_SCRIPT_URL';
    // ================================================
    
    const API_CONFIGURED = GROQ_API_KEY !== 'YOUR_GROQ_API_KEY' && GROQ_API_KEY.length > 10;
    
    let step = 'name', user = {name:'',phone:'',course:''}, msgs = [], lang = 'en-IN';
    const courses = ['BBA','BCA','B.Com','MBA','MCA','B.Sc Nursing','GNM Nursing','M.Sc Nursing','Hotel Management','B.Sc Radiology','Other'];
    
    const txt = {
      'en-IN': {name:"Your name please...",phone:"Your mobile number...",course:"Which course?",welcome:"Namaste! 🙏 I'm Kaia - your admission assistant at Koshys Group of Institutions.\n\nTo give you the best guidance, may I know your name?",nice:"Nice to meet you",gotIt:"Got it!",perfect:"Perfect! Our admission team will call you shortly.\n\nAnything else?",ready:"Ready to help!"},
      'hi-IN': {name:"आपका नाम?",phone:"मोबाइल नंबर?",course:"कौन सा कोर्स?",welcome:"नमस्ते! 🙏 मैं Kaia हूं - कोशिस ग्रुप के एडमिशन असिस्टेंट।\n\nआपका नाम बताइए?",nice:"मिलकर अच्छा लगा",gotIt:"ठीक है!",perfect:"बढ़िया! हमारी टीम जल्दी कॉल करेगी।",ready:"मदद के लिए तैयार!"},
      'kn-IN': {name:"ಹೆಸರು?",phone:"ಮೊಬೈಲ್?",course:"ಯಾವ ಕೋರ್ಸ್?",welcome:"ನಮಸ್ತೆ! 🙏 ನಾನು Kaia - ಕೋಶಿಸ್ ಸಂಸ್ಥೆಗಳ ಆಡ್ಮಿಶನ್ ಸಹಾಯಕ.\n\nನಿಮ್ಮ ಹೆಸರು ತಿಳಿಸಿ?",nice:"ನಿಮ್ಮನ್ನು ಭೇಟಿ ಮಾಡಿ ಸಂತೋಷ",gotIt:"ಅರ್ಥ",perfect:"ಪರಿಪೂರ್ಣ! ನಮ್ಮ ತಂಡ ಕರೆ ಮಾಡುತ್ತದೆ.",ready:"ಸಹಾಯಕ್ಕೆ ಸಿದ್ಧ!"},
      'ta-IN': {name:"பெயர்?",phone:"மொபைல்?",course:"எந்த படிப்பு?",welcome:"நமஸ்காரம்! 🙏 நான் Kaia - கோஷிஸ் குரூப் சேர்க்கை உதவியாளர்.\n\nஉங்கள் பெயரைத் தெரிவிப்பீர்களா?",nice:"உங்களை சந்தித்ததில் மகிழ்ச்சி",gotIt:"புரிந்தது!",perfect:"சிறப்பு! எங்கள் குழு விரைவில் அழைக்கும்.",ready:"உதவி готов!"},
      'te-IN': {name:"पेरु?",phone:"మైబైల్?",course:"ఏ курс?",welcome:"Namaste! 🙏 I'm Kaia - Koshys Group admission assistant.\n\nYour name cheppandi?",nice:"遇 Git",gotIt:"Sardhi!",perfect:"Perfect! Team vadina call chestaaru.",ready:"Help ki ready!"}
    };
    
    function T(k){ return txt[lang]?.[k] || txt['en-IN'][k]; }
    
    function init(){
      addMsg(T('welcome'), 'bot');
      speak(T('welcome'));
      updateProgress();
    }
    
    function updateProgress(){
      const bar = document.getElementById('progressBar'), txt = document.getElementById('progressText'), sta = document.getElementById('status');
      if(step==='done'){ bar.style.display='none'; sta.textContent=T('ready'); document.getElementById('quickActions').style.display='flex'; return; }
      bar.style.display='flex';
      if(step==='name'){ txt.textContent='Step 1 of 3'; }
      else if(step==='phone'){ txt.textContent='Step 2 of 3'; }
      else if(step==='course'){ txt.textContent='Step 3 of 3'; }
    }
    
    function changeLang(){ lang = document.getElementById('langSelect').value; document.getElementById('userInput').placeholder = T(step); }
    
    function addMsg(text, sender){
      const div = document.createElement('div');
      div.className = 'message '+sender;
      div.textContent = text;
      document.getElementById('messages').appendChild(div);
      document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
      msgs.push({role:sender, content:text});
    }
    
    function sendMsg(){
      const input = document.getElementById('userInput');
      const text = input.value.trim();
      if(!text) return;
      addMsg(text, 'user');
      input.value = '';
      
      if(step==='name'){
        user.name = text;
        addMsg(`${T('nice')}, ${text}! 📱\n\n${T('phone')}`, 'bot');
        speak(`${T('nice')}, ${text}! ${T('phone')}`);
        step = 'phone';
      }else if(step==='phone'){
        user.phone = text;
        saveData();
        addMsg(`${T('gotIt')} 📚\n\n${T('course')}`, 'bot');
        speak(`${T('gotIt')} ${T('course')}`);
        step = 'course';
        showCourses();
      }else if(step==='course'){
        user.course = text;
        saveData();
        addMsg(`${T('perfect')}`, 'bot');
        speak(T('perfect'));
        step = 'done';
      }else{
        getAI(text);
      }
      updateProgress();
      document.getElementById('userInput').placeholder = T(step);
    }
    
    function showCourses(){
      const c = document.getElementById('courseButtons');
      c.innerHTML = '';
      courses.forEach(x=>{
        const b = document.createElement('button');
        b.className = 'course-btn';
        b.textContent = x;
        b.onclick = () => { document.getElementById('userInput').value = x; sendMsg(); };
        c.appendChild(b);
      });
      c.style.display = 'flex';
    }
    
    function saveData(){
      if(SHEET_URL && SHEET_URL!=='YOUR_GOOGLE_APPS_SCRIPT_URL'){
        fetch(SHEET_URL, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(user)}).catch(()=>{});
      }
    }
    
    async function getAI(q){
      // Fallback responses when API not configured
      const lowerQ = q.toLowerCase();
      let response = '';
      
      if(lowerQ.includes('fee') || lowerQ.includes('cost') || lowerQ.includes('price')){
        response = 'For detailed fee information, please contact our admission team at 808 866 0000 or visit https://apply.kgi.edu.in';
      }else if(lowerQ.includes('course') || lowerQ.includes('available')){
        response = 'We offer: BBA, BCA, B.Com, MBA, MCA, B.Sc Nursing, GNM, Hotel Management, and more. Which course interests you?';
      }else if(lowerQ.includes('location') || lowerQ.includes('address') || lowerQ.includes('where')){
        response = 'KGI is located at #31/1, Hennur-Bagalur Road, Kannur P.O., Mitganahalli, Bengaluru, Karnataka 562149.';
      }else if(lowerQ.includes('contact') || lowerQ.includes('phone') || lowerQ.includes('call')){
        response = 'Call us at 808 866 0000 or email info@kgi.edu.in';
      }else if(lowerQ.includes('admission') || lowerQ.includes('apply') || lowerQ.includes('register')){
        response = 'Admissions are open! Apply now at https://apply.kgi.edu.in or call 808 866 0000';
      }else if(lowerQ.includes('hello') || lowerQ.includes('hi') || lowerQ.includes('hey') || lowerQ.includes('namaste')){
        response = 'Namaste! How can I help you today? You can ask about courses, admissions, fees, or campus details.';
      }else{
        response = 'Thank you for your interest! For more details, please call 808 866 0000 or visit https://apply.kgi.edu.in';
      }
      
      addMsg(response, 'bot');
      speak(response);
    }
    
    function showTyping(){
      const d = document.createElement('div');
      d.id = 'typing';
      d.className = 'typing';
      d.innerHTML = '<span></span><span></span><span></span>';
      document.getElementById('messages').appendChild(d);
    }
    function hideTyping(){ document.getElementById('typing')?.remove(); }
    
    function speak(text){
      if(!window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = lang;
      u.rate = 0.9;
      window.speechSynthesis.speak(u);
    }
    function speakLast(){ const m = msgs.filter(x=>x.role==='bot').pop(); if(m) speak(m.content); }
    
    function startVoice(){
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if(!SR){ alert('Use Chrome'); return; }
      const r = new SR();
      r.lang = lang;
      r.onresult = e => document.getElementById('userInput').value = e.results[0][0].transcript;
      r.start();
    }
    
    init();
  </script>
</body>
</html>
