<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kaia - KGI Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    
    body { 
      background: #fff; 
      height: 100vh; 
      overflow: hidden; 
    }

    .chat-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .chat-header {
      background: #a91f23;
      color: white;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .chat-header-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .chat-header-info .avatar {
      width: 40px;
      height: 40px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .chat-header h3 { font-size: 16px; font-weight: 600; }
    .chat-header p { font-size: 11px; opacity: 0.8; }

    .lang-select {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      padding: 5px 10px;
      border-radius: 5px;
      font-size: 12px;
      cursor: pointer;
    }

    .lang-select option { color: black; }

    .progress-bar {
      background: #ffe9c6;
      padding: 8px 15px;
      font-size: 12px;
      color: #a91f23;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .progress-bar svg { width: 14px; height: 14px; }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      background: #f9f9f9;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .message {
      max-width: 80%;
      padding: 12px 15px;
      border-radius: 15px;
      font-size: 14px;
      line-height: 1.4;
    }

    .message.bot {
      background: white;
      border: 1px solid #eee;
      align-self: flex-start;
      border-bottom-left-radius: 3px;
    }

    .message.user {
      background: #a91f23;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 3px;
    }

    .typing {
      display: flex;
      gap: 4px;
      padding: 10px;
      background: white;
      border: 1px solid #eee;
      border-radius: 15px;
      width: fit-content;
    }

    .typing span {
      width: 8px;
      height: 8px;
      background: #999;
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out;
    }

    .typing span:nth-child(1) { animation-delay: 0s; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-8px); }
    }

    .course-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 10px;
      background: white;
    }

    .course-btn {
      padding: 8px 15px;
      background: #ffe9c6;
      color: #a91f23;
      border: none;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .course-btn:hover {
      background: #ffa84a;
      color: white;
    }

    .input-area {
      padding: 15px;
      background: white;
      border-top: 1px solid #eee;
      display: flex;
      gap: 10px;
    }

    .input-area input {
      flex: 1;
      padding: 12px 15px;
      border: 1px solid #ddd;
      border-radius: 25px;
      outline: none;
      font-size: 14px;
    }

    .input-area input:focus {
      border-color: #a91f23;
    }

    .input-area button {
      width: 45px;
      height: 45px;
      background: #a91f23;
      color: white;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .input-area button:hover {
      background: #ffa84a;
    }

    .input-area button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .icon-btn {
      width: 40px;
      height: 40px;
      background: #f5f5f5;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .icon-btn:hover {
      background: #eee;
    }

    .quick-actions {
      display: flex;
      justify-content: center;
      gap: 15px;
      padding: 10px;
      background: white;
      border-top: 1px solid #eee;
    }

    .quick-actions a {
      font-size: 12px;
      color: #a91f23;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .quick-actions a:hover {
      color: #ffa84a;
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <div class="chat-header-info">
        <div class="avatar">🎓</div>
        <div>
          <h3>Kaia</h3>
          <p id="status">Gathering details...</p>
        </div>
      </div>
      <select class="lang-select" id="langSelect" onchange="changeLanguage()">
        <option value="en-IN">English</option>
        <option value="hi-IN">हिंदी</option>
        <option value="kn-IN">ಕನ್ನಡ</option>
        <option value="ta-IN">தமிழ்</option>
        <option value="te-IN">తెలుగు</option>
      </select>
    </div>

    <div class="progress-bar" id="progressBar" style="display: none;">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
      <span id="progressText">Step 1 of 3</span>
    </div>

    <div class="messages" id="messages"></div>

    <div class="course-buttons" id="courseButtons" style="display: none;"></div>

    <div class="input-area">
      <button class="icon-btn" onclick="startVoice()" title="Speak">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
      </button>
      <input type="text" id="userInput" placeholder="Your name please..." onkeypress="handleKeyPress(event)">
      <button onclick="sendMessage()" id="sendBtn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" x2="11" y1="2" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
      <button class="icon-btn" onclick="speakLast()" title="Listen">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
      </button>
    </div>

    <div class="quick-actions" id="quickActions" style="display: none;">
      <a href="tel:8088660000">📞 Call</a>
      <a href="https://apply.kgi.edu.in" target="_blank">📝 Apply Now</a>
    </div>
  </div>

  <script>
    const GROQ_API_KEY = 'YOUR_GROQ_API_KEY'; // Replace with your key
    const GROQ_MODEL = 'llama-3.3-70b-versatile';
    
    let step = 'name';
    let userData = { name: '', phone: '', course: '' };
    let messages = [];
    let currentLang = 'en-IN';

    const courses = ['BBA', 'BCA', 'B.Com', 'MBA', 'MCA', 'B.Sc Nursing', 'GNM Nursing', 'M.Sc Nursing', 'Hotel Management', 'B.Sc Radiology', 'Other'];

    const translations = {
      'en-IN': { name: "Your name please...", phone: "Your mobile number...", course: "Which course are you interested in?", welcome: "Namaste! 🙏 I'm Kaia - your admission assistant at Koshys Group of Institutions.\n\nTo give you the best guidance, may I know your name?", nice: "Nice to meet you", gotIt: "Got it!", perfect: "Perfect! Our admission team will call you shortly.", ready: "Ready to help!" },
      'hi-IN': { name: "आपका नाम बताइए...", phone: "आपका मोबाइल नंबर...", course: "आप किस कोर्स में इंटरेस्टेड हैं?", welcome: "नमस्ते! 🙏 मैं Kaia हूं - कोशिस ग्रुप के एडमिशन असिस्टेंट।\n\nबेहतर मार्गदर्शन के लिए, आपका नाम बताइए?", nice: "आपसे मिलकर अच्छा लगा", gotIt: "समझ गया!", perfect: "परफेक्ट! हमारी टीम जल्दी से कॉल करेगी।", ready: "मदद के लिए तैयार!" },
      'kn-IN': { name: "ನಿಮ್ಮ ಹೆಸರು ಏನು...", phone: "ನಿಮ್ಮ ಮೊಬೈಲ್ ಸಂಖ್ಯೆ...", course: "ನೀವು ಯಾವ ಕೋರ್ಸ್ ಗೆ ಆಸಕ್ತಿ ಹೊಂದಿದ್ದೀರಿ?", welcome: "ನಮಸ್ತೆ! 🙏 ನಾನು Kaia - ಕೋಶಿಸ್ ಗ್ರೂಪ್ ಸಂಸ್ಥೆಗಳ ಆಡ್ಮಿಶನ್ ಸಹಾಯಕ.\n\nಉತ್ತಮ ಮಾರ್ಗದರ್ಶನಕ್ಕಾಗಿ, ನಿಮ್ಮ ಹೆಸರು ತಿಳಿಸಿ?", nice: "ನಿಮ್ಮನ್ನು ಭೇಟಿ ಮಾಡಿ ಸಂತೋಷವಾಗಿದೆ", gotIt: "ಅರ್ಥವಾಯಿತು!", perfect: "ಪರಿಪೂರ್ಣ! ನಮ್ಮ ತಂಡ ಶೀಘ್ರದಲ್ಲಿ ಕರೆ ಮಾಡುತ್ತದೆ.", ready: "ಸಹಾಯಕ್ಕೆ ಸಿದ್ಧ!" },
      'ta-IN': { name: "உங்கள் பெயர் என்ன...", phone: "உங்கள் மொபைல் எண்...", course: "எந்த படிப்பில் ஆர்வமாக இருக்கிறீர்கள்?", welcome: "நமஸ்காரம்! 🙏 நான் Kaia - கோஷிஸ் குரூப் நிறுவனங்களின் சேர்க்கை உதவியாளர்.\n\nசிறந்த வழிகாட்டுதலுக்கு, உங்கள் பெயரைத் தெரிவிப்பீர்களா?", nice: "உங்களை சந்தித்ததில் மகிழ்ச்சி", gotIt: "புரிந்தது!", perfect: "சிறப்பு! எங்கள் குழு விரைவில் அழைக்கும்.", ready: "உதவி готов!" },
      'te-IN': { name: "మీ పేరు ఏమిటి...", phone: " మైబైల్ number...", course: " ఏ курсä interest?", welcome: "Namaste! 🙏 I'm Kaia - Koshys Group admission assistant.\n\nFor better guidance, may I know your name?", nice: "Meet you", gotIt: "Got it!", perfect: "Perfect! Team call cheyyali.", ready: "Help ki ready!" }
    };

    function t(key) {
      return translations[currentLang]?.[key] || translations['en-IN'][key];
    }

    function init() {
      addMessage(t('welcome'), 'bot');
      speak(t('welcome'));
      updateProgress();
    }

    function updateProgress() {
      const bar = document.getElementById('progressBar');
      const text = document.getElementById('progressText');
      const status = document.getElementById('status');
      
      if (step === 'done') {
        bar.style.display = 'none';
        status.textContent = t('ready');
        document.getElementById('quickActions').style.display = 'flex';
        return;
      }
      
      bar.style.display = 'flex';
      if (step === 'name') { text.textContent = 'Step 1 of 3'; status.textContent = 'Gathering details...'; }
      else if (step === 'phone') { text.textContent = 'Step 2 of 3'; }
      else if (step === 'course') { text.textContent = 'Step 3 of 3'; }
    }

    function changeLanguage() {
      currentLang = document.getElementById('langSelect').value;
      document.getElementById('userInput').placeholder = t(step);
    }

    function addMessage(text, sender) {
      const container = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = `message ${sender}`;
      div.textContent = text;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
      messages.push({ role: sender, content: text });
    }

    function handleKeyPress(e) {
      if (e.key === 'Enter') sendMessage();
    }

    function sendMessage() {
      const input = document.getElementById('userInput');
      const text = input.value.trim();
      if (!text) return;

      addMessage(text, 'user');
      input.value = '';

      if (step === 'name') {
        userData.name = text;
        addMessage(`${t('nice')}, ${text}! 📱\n\n${t('phone')}`, 'bot');
        speak(`${t('nice')}, ${text}! ${t('phone')}`);
        step = 'phone';
      } else if (step === 'phone') {
        userData.phone = text;
        saveToSheet();
        addMessage(`${t('gotIt')} 📚\n\n${t('course')}`, 'bot');
        speak(`${t('gotIt')} ${t('course')}`);
        step = 'course';
        showCourseButtons();
      } else if (step === 'course') {
        userData.course = text;
        saveToSheet();
        addMessage(`${t('perfect')}\n\nIs there anything else you'd like to know?`, 'bot');
        speak(`${t('perfect')}`);
        step = 'done';
      } else {
        getAIResponse(text);
      }
      updateProgress();
      document.getElementById('userInput').placeholder = t(step);
    }

    function showCourseButtons() {
      const container = document.getElementById('courseButtons');
      container.innerHTML = '';
      courses.forEach(course => {
        const btn = document.createElement('button');
        btn.className = 'course-btn';
        btn.textContent = course;
        btn.onclick = () => {
          document.getElementById('userInput').value = course;
          sendMessage();
        };
        container.appendChild(btn);
      });
      container.style.display = 'flex';
    }

    function saveToSheet() {
      // Replace with your Google Apps Script URL
      const url = 'YOUR_GOOGLE_APPS_SCRIPT_URL';
      fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(userData)
      }).catch(e => console.log('Sheet save error:', e));
    }

    async function getAIResponse(query) {
      showTyping();
      try {
        const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${GROQ_API_KEY}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            model: GROQ_MODEL,
            messages: [
              { role: 'system', content: 'You are Kaia, admission assistant for Koshys Group of Institutions, Bangalore. Be friendly and helpful. For fees, say "For detailed fee info, call 808 866 0000".' },
              ...messages.slice(-10),
              { role: 'user', content: query }
            ],
            temperature: 0.7,
            max_tokens: 300
          })
        });
        const data = await response.json();
        const reply = data.choices[0]?.message?.content || 'Sorry, please try again.';
        hideTyping();
        addMessage(reply, 'bot');
        speak(reply);
      } catch (e) {
        hideTyping();
        addMessage('Sorry, I encountered an error. Call 808 866 0000 for help.', 'bot');
      }
    }

    function showTyping() {
      const container = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = 'typing';
      div.id = 'typing';
      div.innerHTML = '<span></span><span></span><span></span>';
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    function hideTyping() {
      const typing = document.getElementById('typing');
      if (typing) typing.remove();
    }

    function speak(text) {
      if (!window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = currentLang;
      utterance.rate = 0.9;
      window.speechSynthesis.speak(utterance);
    }

    function speakLast() {
      const lastBot = messages.filter(m => m.role === 'bot').pop();
      if (lastBot) speak(lastBot.content);
    }

    function startVoice() {
      if (!window.SpeechRecognition && !window.webkitSpeechRecognition) {
        alert('Voice not supported. Use Chrome.');
        return;
      }
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      const recognition = new SpeechRecognition();
      recognition.lang = currentLang;
      recognition.onresult = (e) => {
        document.getElementById('userInput').value = e.results[0][0].transcript;
      };
      recognition.start();
    }

    init();
  </script>
</body>
</html>
