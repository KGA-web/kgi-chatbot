<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kaia - KGI Assistant</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #fff; }
    
    .kaia-widget {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 99999;
    }
    
    .kaia-toggle {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, #a91f23 0%, #7d1418 100%);
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(169, 31, 35, 0.4);
      transition: transform 0.3s, box-shadow 0.3s;
    }
    
    .kaia-toggle:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 25px rgba(169, 31, 35, 0.5);
    }
    
    .kaia-toggle svg {
      width: 28px;
      height: 28px;
      fill: white;
    }
    
    .kaia-chat {
      display: none;
      position: fixed;
      bottom: 90px;
      right: 20px;
      width: 350px;
      height: 480px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.2);
      overflow: hidden;
      flex-direction: column;
    }
    
    .kaia-chat.show {
      display: flex;
    }
    
    .kaia-header {
      background: linear-gradient(135deg, #a91f23 0%, #7d1418 100%);
      padding: 12px 15px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .kaia-header img {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.3);
    }
    
    .kaia-header-info {
      flex: 1;
    }
    
    .kaia-header-info h3 {
      color: white;
      font-size: 15px;
      font-weight: 600;
    }
    
    .kaia-header-info p {
      color: rgba(255,255,255,0.8);
      font-size: 11px;
    }
    
    .kaia-close {
      background: none;
      border: none;
      color: white;
      cursor: pointer;
      padding: 5px;
      opacity: 0.8;
    }
    
    .kaia-close:hover {
      opacity: 1;
    }
    
    .kaia-progress {
      background: #fff8e6;
      padding: 8px 15px;
      font-size: 11px;
      color: #a91f23;
      font-weight: 500;
    }
    
    .kaia-messages {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      background: #f8f9fa;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .kaia-msg {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.5;
    }
    
    .kaia-msg.bot {
      background: white;
      border: 1px solid #e9ecef;
      align-self: flex-start;
      border-bottom-left-radius: 3px;
      color: #212529;
    }
    
    .kaia-msg.user {
      background: #a91f23;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 3px;
    }
    
    .kaia-courses {
      display: none;
      padding: 10px;
      background: white;
      border-top: 1px solid #e9ecef;
      flex-wrap: wrap;
      gap: 6px;
    }
    
    .kaia-courses.show {
      display: flex;
    }
    
    .kaia-course-btn {
      padding: 6px 12px;
      background: #fff8e6;
      color: #a91f23;
      border: 1px solid #a91f23;
      border-radius: 15px;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .kaia-course-btn:hover {
      background: #a91f23;
      color: white;
    }
    
    .kaia-input-area {
      padding: 12px;
      background: white;
      border-top: 1px solid #e9ecef;
      display: flex;
      gap: 8px;
    }
    
    .kaia-input-area input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #dee2e6;
      border-radius: 20px;
      outline: none;
      font-size: 13px;
      transition: border-color 0.2s;
    }
    
    .kaia-input-area input:focus {
      border-color: #a91f23;
    }
    
    .kaia-send-btn {
      width: 38px;
      height: 38px;
      background: #a91f23;
      color: white;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    
    .kaia-send-btn:hover {
      background: #7d1418;
    }
    
    .kaia-actions {
      display: none;
      justify-content: center;
      gap: 20px;
      padding: 10px;
      background: white;
      border-top: 1px solid #e9ecef;
    }
    
    .kaia-actions.show {
      display: flex;
    }
    
    .kaia-actions a {
      font-size: 12px;
      color: #a91f23;
      text-decoration: none;
      font-weight: 500;
    }
    
    .kaia-actions a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="kaia-widget">
    <div class="kaia-toggle" onclick="toggleKaia()">
      <svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
    </div>
    
    <div class="kaia-chat" id="kaiaChat">
      <div class="kaia-header">
        <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3E%3Cpath d='M12 3L1 9l4 2.18v6L12 21l7-3.82v-6l2-1.09V17h2V9L12 3zm6.82 6L12 12.72 5.18 9 12 5.28 18.82 9zM17 15.99l-5 2.73-5-2.73v-3.72L12 15l5-2.73v3.72z'/%3E%3C/svg%3E" alt="Kaia">
        <div class="kaia-header-info">
          <h3>Kaia</h3>
          <p>Koshys Group of Institutions</p>
        </div>
        <button class="kaia-close" onclick="toggleKaia()">✕</button>
      </div>
      
      <div class="kaia-progress" id="kaiaProgress">
        <span>Step 1 of 3</span>
      </div>
      
      <div class="kaia-messages" id="kaiaMessages"></div>
      
      <div class="kaia-courses" id="kaiaCourses"></div>
      
      <div class="kaia-input-area">
        <input type="text" id="kaiaInput" placeholder="Your name please..." onkeypress="if(event.key==='Enter')sendKaia()">
        <button class="kaia-send-btn" onclick="sendKaia()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" x2="11" y1="2" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
      
      <div class="kaia-actions" id="kaiaActions">
        <a href="tel:8088660000">📞 Call Now</a>
        <a href="https://apply.kgi.edu.in" target="_blank">📝 Apply Now</a>
      </div>
    </div>
  </div>

  <script>
    // ===================== CONFIG =====================
    const GROQ_API_KEY = 'YOUR_GROQ_API_KEY';
    const SHEET_URL = 'YOUR_GOOGLE_APPS_SCRIPT_URL';
    // ================================================
    
    let kaiaStep = 'name', kaiaUser = {name:'',phone:'',course:''}, kaiaMsgs = [];
    const kaiaCourses = ['BBA','BCA','B.Com','MBA','MCA','B.Sc Nursing','GNM','Hotel Management'];
    
    const kaiaWelcome = "Namaste! 🙏 I'm Kaia - your admission assistant at Koshys Group of Institutions.\n\nMay I know your name?";
    
    function toggleKaia(){
      const chat = document.getElementById('kaiaChat');
      const btn = document.querySelector('.kaia-toggle');
      if(chat.classList.contains('show')){
        chat.classList.remove('show');
        btn.style.display = 'flex';
      }else{
        chat.classList.add('show');
        btn.style.display = 'none';
      }
    }
    
    function kaiaAddMsg(text, sender){
      const div = document.createElement('div');
      div.className = 'kaia-msg '+sender;
      div.textContent = text;
      document.getElementById('kaiaMessages').appendChild(div);
      document.getElementById('kaiaMessages').scrollTop = document.getElementById('kaiaMessages').scrollHeight;
      kaiaMsgs.push({role:sender, content:text});
    }
    
    function kaiaUpdateProgress(){
      const bar = document.getElementById('kaiaProgress');
      if(kaiaStep==='done'){ 
        bar.style.display='none'; 
        document.getElementById('kaiaActions').classList.add('show'); 
        return; 
      }
      bar.style.display='block';
      if(kaiaStep==='name'){ bar.textContent='Step 1 of 3'; }
      else if(kaiaStep==='phone'){ bar.textContent='Step 2 of 3'; }
      else if(kaiaStep==='course'){ bar.textContent='Step 3 of 3'; }
    }
    
    function kaiaShowCourses(){
      const c = document.getElementById('kaiaCourses');
      c.innerHTML = '';
      kaiaCourses.forEach(x=>{
        const b = document.createElement('button');
        b.className = 'kaia-course-btn';
        b.textContent = x;
        b.onclick = () => { document.getElementById('kaiaInput').value = x; sendKaia(); };
        c.appendChild(b);
      });
      c.classList.add('show');
    }
    
    function kaiaSave(){
      if(SHEET_URL && SHEET_URL!=='YOUR_GOOGLE_APPS_SCRIPT_URL'){
        fetch(SHEET_URL, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(kaiaUser)}).catch(()=>{});
      }
    }
    
    function kaiaGetAI(q){
      const lowerQ = q.toLowerCase();
      let response = '';
      
      if(lowerQ.includes('fee') || lowerQ.includes('cost')){
        response = 'For fee details, please call 808 866 0000 or visit https://apply.kgi.edu.in';
      }else if(lowerQ.includes('course')){
        response = 'We offer: BBA, BCA, B.Com, MBA, MCA, B.Sc Nursing, GNM, Hotel Management. Which course interests you?';
      }else if(lowerQ.includes('location') || lowerQ.includes('address')){
        response = 'KGI is located at #31/1, Hennur-Bagalur Road, Kannur P.O., Bengaluru, Karnataka 562149';
      }else if(lowerQ.includes('contact') || lowerQ.includes('phone')){
        response = 'Call us at 808 866 0000 or email info@kgi.edu.in';
      }else if(lowerQ.includes('admission') || lowerQ.includes('apply')){
        response = 'Admissions are open! Apply now at https://apply.kgi.edu.in or call 808 866 0000';
      }else if(lowerQ.includes('hello') || lowerQ.includes('hi') || lowerQ.includes('namaste')){
        response = 'Namaste! How can I help you today?';
      }else{
        response = 'Thank you! For more details, call 808 866 0000 or visit https://apply.kgi.edu.in';
      }
      
      kaiaAddMsg(response, 'bot');
    }
    
    function sendKaia(){
      const input = document.getElementById('kaiaInput');
      const text = input.value.trim();
      if(!text) return;
      kaiaAddMsg(text, 'user');
      input.value = '';
      
      if(kaiaStep==='name'){
        kaiaUser.name = text;
        kaiaAddMsg(`Nice to meet you, ${text}! 📱\n\nCould you share your mobile number?`, 'bot');
        kaiaStep = 'phone';
      }else if(kaiaStep==='phone'){
        kaiaUser.phone = text;
        kaiaSave();
        kaiaAddMsg(`Got it! 📚\n\nWhich course are you interested in?`, 'bot');
        kaiaStep = 'course';
        kaiaShowCourses();
      }else if(kaiaStep==='course'){
        kaiaUser.course = text;
        kaiaSave();
        kaiaAddMsg(`Perfect! ${text} is a great choice! 🎓\n\nOur admission team will call you shortly.\n\nIs there anything else you'd like to know?`, 'bot');
        kaiaStep = 'done';
      }else{
        kaiaGetAI(text);
      }
      kaiaUpdateProgress();
      
      const placeholder = kaiaStep==='name' ? 'Your name please...' : kaiaStep==='phone' ? 'Your mobile number...' : 'Ask me anything...';
      document.getElementById('kaiaInput').placeholder = placeholder;
    }
    
    // Initialize - show welcome message
    kaiaAddMsg(kaiaWelcome, 'bot');
  </script>
</body>
</html>
